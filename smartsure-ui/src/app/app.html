<nav class="navbar" *ngIf="authService.isLoggedIn()">
  <a class="nav-brand" routerLink="/">
    <div class="brand-icon">🛡️</div>
    <span class="brand-text">SmartSure</span>
  </a>

  <div class="nav-links">
    <ng-container *ngIf="authService.getRole() === 'Customer'">
      <a routerLink="/customer/dashboard" routerLinkActive="active">
        <span>📊</span> Dashboard
      </a>
      <a routerLink="/customer/policies" routerLinkActive="active">
        <span>📋</span> My Policies
      </a>
      <a routerLink="/customer/buy-policy" routerLinkActive="active">
        <span>🛡️</span> Buy Policy
      </a>
      <a routerLink="/claims/track" routerLinkActive="active">
        <span>📁</span> Claims
      </a>
    </ng-container>
    <ng-container *ngIf="authService.getRole() === 'Admin'">
      <a routerLink="/admin/dashboard" routerLinkActive="active">
        <span>📊</span> Dashboard
      </a>
      <a routerLink="/admin/claims" routerLinkActive="active">
        <span>📁</span> Claims
      </a>
      <a routerLink="/admin/policies" routerLinkActive="active">
        <span>📋</span> Policies
      </a>
      <a routerLink="/admin/users" routerLinkActive="active">
        <span>👥</span> Users
      </a>
      <a routerLink="/reports" routerLinkActive="active">
        <span>📈</span> Reports
      </a>
    </ng-container>
  </div>

  <div class="nav-right">
    <div class="user-info">
      <div class="user-avatar">{{ authService.getFullName().charAt(0).toUpperCase() || 'U' }}</div>
      <div>
        <div class="user-name">{{ authService.getFullName() }}</div>
        <span class="badge" [class]="authService.getRole() === 'Admin' ? 'badge-admin' : 'badge-customer'" style="font-size:0.65rem;">
          {{ authService.getRole() }}
        </span>
      </div>
    </div>
    <button class="btn btn-secondary btn-sm" (click)="authService.logout()">Logout</button>
  </div>
</nav>

<main class="main-content">
  <router-outlet />
</main>
