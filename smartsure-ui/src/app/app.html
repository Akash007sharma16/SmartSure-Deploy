<ng-container [ngSwitch]="layoutMode">

  <!-- ── AUTHENTICATED LAYOUT (dashboard pages) ── -->
  <ng-container *ngSwitchCase="'app'">
    <nav class="app-navbar">
      <a class="nav-brand" [routerLink]="authService.getRole()==='Admin' ? '/admin/dashboard' : '/customer/dashboard'">
        <div class="brand-icon">🛡️</div>
        <span class="brand-text">SmartSure</span>
      </a>
      <div class="nav-links">
        <ng-container *ngIf="authService.getRole() === 'Customer'">
          <a routerLink="/customer/dashboard" routerLinkActive="active">Dashboard</a>
          <a routerLink="/customer/policies" routerLinkActive="active">My Policies</a>
          <a routerLink="/customer/buy-policy" routerLinkActive="active">Buy Policy</a>
          <a routerLink="/claims/track" routerLinkActive="active">My Claims</a>
        </ng-container>
        <ng-container *ngIf="authService.getRole() === 'Admin'">
          <a routerLink="/admin/dashboard" routerLinkActive="active">Dashboard</a>
          <a routerLink="/admin/claims" routerLinkActive="active">Claims</a>
          <a routerLink="/admin/policies" routerLinkActive="active">Policies</a>
          <a routerLink="/admin/users" routerLinkActive="active">Users</a>
          <a routerLink="/reports" routerLinkActive="active">Reports</a>
        </ng-container>
      </div>
      <div class="nav-right">
        <div class="d-flex align-items-center gap-2">
          <div class="user-avatar">{{ authService.getFullName().charAt(0).toUpperCase() }}</div>
          <div>
            <div class="user-name">{{ authService.getFullName() }}</div>
            <span class="badge"
              [class]="authService.getRole()==='Admin' ? 'bg-primary' : 'bg-info text-dark'"
              style="font-size:0.62rem;">
              {{ authService.getRole() }}
            </span>
          </div>
        </div>
        <button class="btn btn-outline-secondary btn-sm ms-2" (click)="authService.logout()">Logout</button>
      </div>
    </nav>
    <main class="main-content">
      <router-outlet />
    </main>
  </ng-container>

  <!-- ── PUBLIC LAYOUT (landing, login, register — full viewport, no navbar) ── -->
  <ng-container *ngSwitchDefault>
    <router-outlet />
  </ng-container>

</ng-container>
